# ═══════════════════════════════════════════════════════════════
# Model Registry — Efficient Vision Model Benchmark
# ═══════════════════════════════════════════════════════════════
# Curated selection spanning classical, mobile-optimized, and
# cutting-edge SOTA vision architectures (2016–2025).
#
# Weights are loaded via PyTorch Image Models (timm) or torchvision.

# ── Cutting-Edge (2023-2025 SOTA Edge Models) ───────────────

efficientvit_m0:
  name: "EfficientViT-M0"
  model_id: "efficientvit_m0.r224_in1k"
  source: "timm"
  input_size: 224
  year: 2023
  paper: "Cai et al. (MIT), EfficientViT: Memory Efficient Vision Transformer, ICCV 2023"
  description: "Linear attention architecture dominating edge deployments; highly memory-bound hardware optimized."

fastvit_t8:
  name: "FastViT-T8"
  model_id: "fastvit_t8.apple_in1k"
  source: "timm"
  input_size: 224
  year: 2023
  paper: "Vasu et al. (Apple), FastViT: A Fast Hybrid Vision Transformer, ICCV 2023"
  description: "Apple's hybrid CNN-Transformer architecture optimized for extremely fast on-device inference latency."

repvit_m0_9:
  name: "RepViT-M0.9"
  model_id: "repvit_m0_9.dist_in1k"
  source: "timm"
  input_size: 224
  year: 2024
  paper: "Wang et al. (Tsinghua), RepViT: Revisiting Mobile CNN From ViT Perspective, CVPR 2024"
  description: "Re-parameterized ViT structure maintaining CNN-level rapid inference speeds with Transformer-level accuracy."

mobilevitv2_050:
  name: "MobileViTv2-0.5"
  model_id: "mobilevitv2_050.cvnets_in1k"
  source: "timm"
  input_size: 256
  year: 2022
  paper: "Mehta et al. (Apple), Separable Self-attention for Mobile Vision Transformers, T-PAMI 2022"
  description: "Global processing with linear complexity via separable self-attention."

mobilenetv4_conv_small:
  name: "MobileNetV4-Small"
  model_id: "mobilenetv4_conv_small.e2400_r224_in1k"
  source: "timm"
  input_size: 224
  year: 2024
  paper: "Qin et al. (Google), MobileNetV4 - Universal Models for the Mobile Ecosystem, CVPR 2024"
  description: "Google's latest 2024 iteration of MobileNet optimized for universal hardware abstraction."

# ── Classical & Standard Baselines ───────────────────────────

resnet50:
  name: "ResNet-50"
  model_id: "resnet50"
  source: "torchvision"
  weights: "IMAGENET1K_V2"
  input_size: 224
  year: 2016
  paper: "He et al., Deep Residual Learning for Image Recognition, CVPR 2016"
  description: "Standard residual network — widely used accuracy baseline"

mobilenet_v3_large:
  name: "MobileNetV3-Large"
  model_id: "mobilenet_v3_large"
  source: "torchvision"
  weights: "IMAGENET1K_V2"
  input_size: 224
  year: 2019
  paper: "Howard et al., Searching for MobileNetV3, ICCV 2019"
  description: "NAS-designed with squeeze-excite — mobile deployment standard"

efficientnet_b0:
  name: "EfficientNet-B0"
  model_id: "efficientnet_b0"
  source: "torchvision"
  weights: "IMAGENET1K_V1"
  input_size: 224
  year: 2019
  paper: "Tan & Le, EfficientNet: Rethinking Model Scaling, ICML 2019"
  description: "Compound-scaled architecture — best accuracy/FLOPs ratio in its class"

convnext_tiny:
  name: "ConvNeXt-Tiny"
  model_id: "convnext_tiny"
  source: "torchvision"
  weights: "IMAGENET1K_V1"
  input_size: 224
  year: 2022
  paper: "Liu et al., A ConvNet for the 2020s, CVPR 2022"
  description: "Modernized pure-CNN design competitive with Vision Transformers"
